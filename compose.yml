
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: estat-health-dash:back

    tty: true
    stdin_open: true
    ports:
      - "8787:8787"
    volumes:
      # D1データベースのデータを永続化
      - ./backend/.wrangler:/app/.wrangler
      # APIキーを読み込ませるため
      - ./backend/.dev.vars:/app/.dev.vars
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: estat-health-dash:front

    volumes:
      - ./frontend/public:/app/public
      - ./frontend/src:/app/src

    working_dir: "/app"

    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8787
    depends_on:
      - backend
    restart: unless-stopped

